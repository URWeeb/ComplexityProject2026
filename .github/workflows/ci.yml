name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.stage }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        stage:
          - Types
          - DPLL
          - Levin
          - Useful
          - Stress

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build --parallel 2

      - name: Run tests (Types)
        if: matrix.stage == 'Types'
        working-directory: build
        run: ./run_tests --gtest_filter="SolverResultTest.*:SearchStatisticsTest.*:ProgramTest.*:TypeAliasesTest.*"

      - name: Run tests (DPLL)
        if: matrix.stage == 'DPLL'
        working-directory: build
        run: ./run_tests --gtest_filter="SimplifyTest.*:UnitPropagateTest.*:PureLiteralAssignTest.*:VerifyTest.*:ProcessAlgorithmTest.*:BuildProgramsTest.*"

      - name: Run tests (Levin)
        if: matrix.stage == 'Levin'
        working-directory: build
        run: ./run_tests --gtest_filter="LevinSatTest.*:LevinUnsatTest.*:LevinCorrectnessTest.*:LevinStatsTest.*:LevinSettingsTest.*"

      - name: Run tests (Useful)
        if: matrix.stage == 'Useful'
        working-directory: build
        run: ./run_tests --gtest_filter="GetVariableCountTest.*:ElapsedTimeTest.*:Random3CNFTest.*:ParseDimacsTest.*:MakeSearchTest.*"

      - name: Run tests (Stress)
        if: matrix.stage == 'Stress'
        working-directory: build
        run: ./run_tests --gtest_filter="StressVerifyTest.*"